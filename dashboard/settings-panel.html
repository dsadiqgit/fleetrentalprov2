<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
    <div class="p-6 border-b border-gray-200">
        <div class="flex items-center justify-between">
            <h3 class="text-xl font-bold text-gray-900">Website Settings</h3>
            <button onclick="toggleSettings()" class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>
    
    <div class="p-6 space-y-6">
        <!-- Font Settings -->
        <div>
            <h4 class="text-sm font-semibold text-gray-900 mb-4">Typography</h4>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Font Family</label>
                    <select id="fontFamily" onchange="updateFont(this.value)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="Inter">Inter (Default)</option>
                        <option value="Poppins">Poppins</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Open Sans">Open Sans</option>
                        <option value="Lato">Lato</option>
                        <option value="Montserrat">Montserrat</option>
                        <option value="Playfair Display">Playfair Display</option>
                        <option value="Raleway">Raleway</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Color Settings -->
        <div>
            <h4 class="text-sm font-semibold text-gray-900 mb-4">Colors</h4>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Primary Color</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="primaryColor" value="#3b82f6" onchange="updateColor('primary', this.value)" class="w-12 h-12 rounded-lg border-2 border-gray-300 cursor-pointer">
                        <input type="text" id="primaryColorText" value="#3b82f6" onchange="updateColorFromText('primary', this.value)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Secondary Color</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="secondaryColor" value="#1e40af" onchange="updateColor('secondary', this.value)" class="w-12 h-12 rounded-lg border-2 border-gray-300 cursor-pointer">
                        <input type="text" id="secondaryColorText" value="#1e40af" onchange="updateColorFromText('secondary', this.value)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Text Color</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="textColor" value="#111827" onchange="updateColor('text', this.value)" class="w-12 h-12 rounded-lg border-2 border-gray-300 cursor-pointer">
                        <input type="text" id="textColorText" value="#111827" onchange="updateColorFromText('text', this.value)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Background Color</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="backgroundColor" value="#ffffff" onchange="updateColor('background', this.value)" class="w-12 h-12 rounded-lg border-2 border-gray-300 cursor-pointer">
                        <input type="text" id="backgroundColorText" value="#ffffff" onchange="updateColorFromText('background', this.value)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>
            </div>
        </div>

        <!-- Reset Button -->
        <div class="pt-4 border-t border-gray-200">
            <button onclick="resetSettings()" class="w-full px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium">
                Reset to Default
            </button>
        </div>
    </div>
</div>
